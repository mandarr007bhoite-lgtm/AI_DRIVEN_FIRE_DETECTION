<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Detection History</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f7fb;
      padding: 40px;
      color: #1d3557;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }
    th {
      background-color: #1d3557;
      color: white;
    }
    tr:hover {
      background-color: #f1f1f1;
    }
    .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #457b9d;
      text-decoration: none;
      font-weight: bold;
    }
    .back:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>🔥 Fire Detection History</h1>
  <div id="fire-banner" style="display:none"></div>
  <table>
    <tr>
      <th>#</th>
      <th>Day</th>
      <th>Date</th>
      <th>Exact Time</th>
      <th>Seconds Ago</th>
      <th>Intensity</th>
    </tr>
    {% for log in logs %}
    <tr>
      <td>{{ loop.index }}</td>
      <td>{{ log.day }}</td>
      <td>{{ log.date }}</td>
      <td>{{ log.time }}</td>
      <td>{{ log.seconds_ago }}</td>
      <td>{{ log.intensity }}</td>
    </tr>
    {% endfor %}
  </table>
  <a href="/dashboard" class="back">⬅ Back to Dashboard</a>
</body>
</html>
<script src="/static/notify.js"></script>
